<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timer App</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1220;
      color: #e8eefc;
    }
    .card {
      width: min(520px, 92vw);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      text-align: center;
    }
    .timer {
      font-variant-numeric: tabular-nums;
      font-size: clamp(44px, 6vw, 72px);
      letter-spacing: 0.06em;
      margin: 10px 0 22px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: inherit;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, opacity 120ms ease;
      min-width: 110px;
    }
    button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.12); }
    button:active { transform: translateY(0px) scale(0.99); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      opacity: 0.75;
    }
    kbd {
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card" role="application" aria-label="Timer">
    <div class="timer" id="timer" aria-live="polite">00:00.0</div>

    <div class="buttons">
      <button id="playBtn" type="button">Play</button>
      <button id="pauseBtn" type="button" disabled>Pause</button>
      <button id="stopBtn" type="button" disabled>Stop</button>
    </div>

    <div class="hint">
      Shortcuts: <kbd>Space</kbd> play/pause, <kbd>Esc</kbd> stop
    </div>
  </div>

  <script>
    const timerEl = document.getElementById("timer");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const stopBtn = document.getElementById("stopBtn");

    let startTime = 0;     // performance.now() at start
    let elapsedMs = 0;     // accumulated elapsed time
    let rafId = null;      // requestAnimationFrame id
    let running = false;

    function formatTime(ms) {
      const totalTenths = Math.floor(ms / 100); // 0.1s precision
      const tenths = totalTenths % 10;
      const totalSeconds = Math.floor(totalTenths / 10);
      const seconds = totalSeconds % 60;
      const minutes = Math.floor(totalSeconds / 60);

      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");
      return `${mm}:${ss}.${tenths}`;
    }

    function render(ms) {
      timerEl.textContent = formatTime(ms);
    }

    function tick(now) {
      const currentElapsed = elapsedMs + (now - startTime);
      render(currentElapsed);
      rafId = requestAnimationFrame(tick);
    }

    function setButtons() {
      playBtn.disabled = running;
      pauseBtn.disabled = !running;
      stopBtn.disabled = (!running && elapsedMs === 0);
    }

    function play() {
      if (running) return;
      running = true;
      startTime = performance.now();
      rafId = requestAnimationFrame(tick);
      setButtons();
    }

    function pause() {
      if (!running) return;
      running = false;
      cancelAnimationFrame(rafId);
      rafId = null;
      elapsedMs += performance.now() - startTime;
      setButtons();
    }

    function stop() {
      if (running) {
        cancelAnimationFrame(rafId);
        rafId = null;
        running = false;
      }
      elapsedMs = 0;
      render(0);
      setButtons();
    }

    playBtn.addEventListener("click", play);
    pauseBtn.addEventListener("click", pause);
    stopBtn.addEventListener("click", stop);

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        running ? pause() : play();
      } else if (e.code === "Escape") {
        stop();
      }
    });

    // initial render
    render(0);
    setButtons();
  </script>
</body>
</html>
